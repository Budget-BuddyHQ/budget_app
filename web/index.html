<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Budget Buddy - Your Financial Literacy Gaming Platform">
  <meta name="theme-color" content="#1A4D3D">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Budget Buddy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="shortcut icon" type="image/png" href="favicon.png">

  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.json">

  <title>Budget Buddy - Learn Finance Through Gaming</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1A4D3D;
    }

    body {
      margin: 0;
      padding: 0;
      position: fixed;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Loading screen styles */
    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1A4D3D 0%, #2E4A3D 50%, #0F2018 100%);
      color: #76FF03;
      font-size: 18px;
      font-weight: 500;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(118, 255, 3, 0.3);
      border-top: 3px solid #76FF03;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Mobile responsiveness */
    @media (max-width: 600px) {
      body {
        position: fixed;
        width: 100vw;
        height: 100vh;
        -webkit-user-select: none;
        user-select: none;
      }

      #app {
        width: 100vw;
        height: 100vh;
      }
    }

    /* Prevent zoom on input focus for iOS */
    input, textarea, select {
      font-size: 16px !important;
    }

    /* Smooth scrolling */
    * {
      scroll-behavior: smooth;
    }

    /* Hide scrollbars but keep functionality */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(118, 255, 3, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(118, 255, 3, 0.5);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-screen">
      <div class="spinner"></div>
      <span>Loading Budget Buddy...</span>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
