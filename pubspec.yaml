name: budget_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  window_manager: ^0.5.1
  http: ^1.6.0
  webview_flutter: ^4.8.0
  boxicons: ^2.1.0
  supabase_flutter: ^2.5.6
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  bonfire: ^3.17.0
  fl_chart: ^0.69.0
  flame: ^1.18.0
  flame_tiled: ^1.20.3
  lottie: ^3.3.0
  flutter_svg: ^2.2.0
  audioplayers: ^6.6.0
  image_picker: ^1.1.2
  cloudflare_turnstile: ^1.0.0
  flutter_3d_controller: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: NormalFont
      fonts:
        - asset: assets/fonts/NormalFont.ttf
  assets:
    - assets/images/logo.png
    - assets/images/
    - assets/images/turtles/
    - assets/animations/
    - assets/audio/
    - assets/data/
    - assets/map/
    - assets/icons/
    - assets/fonts/
    - assets/imported/pond_loading_animation_source/pond.glb
    - assets/imported/
    - assets/self_made_backgrounds/
    - assets/map_assets_coins/PNG_more_map_tiles/

